<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="SoundWave - Modern müzik dinleme platformu. En sevdiğiniz şarkıları keşfedin ve dinleyin." />
  <title>SoundWave | Müzik Platformu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===== HEADER / NAVBAR ===== -->
  <header id="app-header">
    <div class="header-inner">
      <a href="#" class="logo" id="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="2" />
          <path d="M12 10 L12 22 L23 16 Z" fill="currentColor" />
        </svg>
        <span>SoundWave</span>
      </a>
      <nav id="main-nav">
        <a href="#" class="nav-link active" data-section="discover">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <polygon points="10,8 16,12 10,16" />
          </svg>
          Keşfet
        </a>
        <a href="#" class="nav-link" data-section="library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>
          Kitaplık
        </a>
        <a href="#" class="nav-link" data-section="favorites">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
          Beğenilenler
        </a>
      </nav>
      <div class="header-actions">
        <div class="search-box" id="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" placeholder="Şarkı, sanatçı ara..." autocomplete="off" />
        </div>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main-content">
    <!-- Hero Section -->
    <section class="hero-section" id="hero-section">
      <div class="hero-bg"></div>
      <div class="hero-content">
      </div>
    </section>

    <!-- Genre Filter -->
    <section class="filter-section" id="filter-section">
      <div class="filter-chips">
        <button class="chip active" data-genre="all">Tümü</button>
        <!-- Chips will be populated dynamically -->
      </div>
    </section>

    <!-- Song Grid -->
    <section class="songs-section" id="songs-section">
      <h2 class="section-title">
        <span class="title-accent"></span>
        Tüm Şarkılar
      </h2>
      <div class="songs-grid" id="songs-grid">
        <!-- Songs will be loaded from songs.json -->
      </div>
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Şarkılar yükleniyor...</p>
      </div>
      <div class="empty-state" id="empty-state" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10" />
          <path d="M8 15s1.5 2 4 2 4-2 4-2" />
          <line x1="9" y1="9" x2="9.01" y2="9" />
          <line x1="15" y1="9" x2="15.01" y2="9" />
        </svg>
        <p>Sonuç bulunamadı</p>
      </div>
    </section>
  </main>

  <!-- ===== FOOTER / PLAYER ===== -->
  <footer id="player-bar">
    <div class="player-inner">
      <!-- Currently Playing Info -->
      <div class="player-track-info" id="player-track-info">
        <div class="player-cover-wrap">
          <img id="player-cover" src="" alt="Albüm Kapağı" />
        </div>
        <div class="player-meta">
          <span class="player-title" id="player-title">Şarkı Seçin</span>
          <span class="player-artist" id="player-artist">—</span>
        </div>
        <button class="btn-icon btn-like" id="btn-like" title="Beğen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
        </button>
      </div>

      <!-- Player Controls -->
      <div class="player-controls">
        <div class="control-buttons">
          <button class="btn-icon" id="btn-shuffle" title="Karıştır">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 3 21 3 21 8" />
              <line x1="4" y1="20" x2="21" y2="3" />
              <polyline points="21 16 21 21 16 21" />
              <line x1="15" y1="15" x2="21" y2="21" />
              <line x1="4" y1="4" x2="9" y2="9" />
            </svg>
          </button>
          <button class="btn-icon" id="btn-prev" title="Önceki">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="19,20 9,12 19,4" />
              <line x1="5" y1="4" x2="5" y2="20" stroke="currentColor" stroke-width="2" />
            </svg>
          </button>
          <button class="btn-play" id="btn-play" title="Oynat">
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="6,3 20,12 6,21" />
            </svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <rect x="5" y="3" width="4" height="18" />
              <rect x="15" y="3" width="4" height="18" />
            </svg>
          </button>
          <button class="btn-icon" id="btn-next" title="Sonraki">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,4 15,12 5,20" />
              <line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2" />
            </svg>
          </button>
          <button class="btn-icon" id="btn-repeat" title="Tekrarla">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="17 1 21 5 17 9" />
              <path d="M3 11V9a4 4 0 0 1 4-4h14" />
              <polyline points="7 23 3 19 7 15" />
              <path d="M21 13v2a4 4 0 0 1-4 4H3" />
            </svg>
          </button>
        </div>
        <div class="progress-container">
          <span class="time-current" id="time-current">0:00</span>
          <div class="progress-bar-wrap" id="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar">
              <div class="progress-handle"></div>
            </div>
          </div>
          <span class="time-total" id="time-total">0:00</span>
        </div>
      </div>

      <!-- Volume -->
      <div class="player-volume">
        <button class="btn-icon" id="btn-volume" title="Ses">
          <svg class="icon-vol-high" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="currentColor" />
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
          </svg>
          <svg class="icon-vol-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="currentColor" />
            <line x1="23" y1="9" x2="17" y2="15" />
            <line x1="17" y1="9" x2="23" y2="15" />
          </svg>
        </button>
        <div class="volume-bar-wrap" id="volume-bar-wrap">
          <div class="volume-bar" id="volume-bar">
            <div class="volume-handle"></div>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <!-- Audio Element -->
  <audio id="audio-player" preload="metadata"></audio>

  <script src="script.js"></script>
</body>

</html>
